---
layout: default
---
<article class="page-shell">
  <header class="page-header">
    <p class="eyebrow">{{ page.eyebrow | default: "Page" }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.lede %}
      <p class="lede">{{ page.lede }}</p>
    {% endif %}
  </header>

  <div class="prose">
    {{ content }}
  </div>
</article>
