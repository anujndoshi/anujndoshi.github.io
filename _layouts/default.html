<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title and page.title != "Home" %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description | strip_html | normalize_whitespace | escape }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  {% assign current_url = page.url | replace: 'index.html', '' %}
  <div class="site-shell">
    <header class="site-header">
      <div class="brand-copy">
        <a class="brand-name" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <div class="brand-links">
          <a class="social-link" href="{{ site.linkedin_url }}" aria-label="LinkedIn">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6.94 8.5H3.56V19.5h3.38V8.5Zm.22-3.4c0-1.02-.77-1.84-1.9-1.84s-1.9.82-1.9 1.84.76 1.84 1.87 1.84h.03c1.15 0 1.9-.82 1.9-1.84ZM20.5 12.74c0-3.37-1.8-4.94-4.2-4.94-1.94 0-2.81 1.07-3.29 1.82V8.5H9.63c.04.74 0 11 0 11H13v-6.14c0-.33.02-.66.12-.9.26-.66.85-1.35 1.84-1.35 1.3 0 1.83 1 1.83 2.46v5.93h3.38v-6.76Z"/>
            </svg>
          </a>
        </div>
      </div>

      <nav class="site-nav" aria-label="Primary">
        <a class="nav-link{% if current_url == '/' %} is-active{% endif %}" href="{{ '/' | relative_url }}">Home</a>
        <a class="nav-link{% if current_url == '/patents/' %} is-active{% endif %}" href="{{ '/patents/' | relative_url }}">Patents &amp; Publications</a>
        <a class="nav-link{% if current_url == '/about/' %} is-active{% endif %}" href="{{ '/about/' | relative_url }}">About</a>
      </nav>
    </header>

    <main class="site-main">
      {{ content }}
    </main>
  </div>
</body>
</html>
