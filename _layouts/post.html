---
layout: default
---
<article class="post-shell">
  <header class="page-header">
    <p class="eyebrow">Writing</p>
    <h1>{{ page.title }}</h1>
    <p class="post-meta">{{ page.date | date: "%B %-d, %Y" }}</p>
    {% if page.description %}
      <p class="lede">{{ page.description }}</p>
    {% endif %}
  </header>

  <div class="prose">
    {{ content }}
  </div>
</article>
